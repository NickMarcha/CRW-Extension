services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      DATASET_URL: https://raw.githubusercontent.com/FULU-Foundation/CRW-Extension/refs/heads/export_cargo/all_cargo_combined.json
    depends_on:
      - redis
    cap_add:
      - SYS_ADMIN
    shm_size: "1g"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  redis-data:
