services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
      DATASET_URL: https://raw.githubusercontent.com/FULU-Foundation/CRW-Extension/refs/heads/export_cargo/all_cargo_combined.json
    depends_on:
      - redis
    cap_add:
      - SYS_ADMIN
    shm_size: "1g"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    entrypoint: ["sh", "-c"]
    command: >
      if [ -z "$$TUNNEL_TOKEN" ]; then
        echo 'CLOUDFLARE_TUNNEL_TOKEN not set - skipping tunnel';
        exit 0;
      fi;
      exec cloudflared tunnel run --token "$$TUNNEL_TOKEN"
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - server
    restart: on-failure

volumes:
  redis-data:
